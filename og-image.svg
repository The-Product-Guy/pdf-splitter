<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PDF Splitter</title>
  <desc id="desc">Split large PDF files privately in your browser.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="72" width="1060" height="486" rx="36" fill="#ffffff" stroke="#dbe4ff" stroke-width="2"/>
  <g transform="translate(116 126)">
    <rect x="0" y="0" width="190" height="238" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="4"/>
    <path d="M130 0v66h60" fill="#e0e7ff"/>
    <path d="M130 0v66h60" fill="none" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="34" y="104" width="122" height="18" rx="9" fill="#4f46e5"/>
    <rect x="34" y="144" width="94" height="14" rx="7" fill="#94a3b8"/>
    <rect x="34" y="176" width="112" height="14" rx="7" fill="#94a3b8"/>
  </g>
  <g transform="translate(360 126)">
    <text x="0" y="72" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#111827">PDF Splitter</text>
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="34" font-weight="600" fill="#334155">Split large PDF files into smaller chunks</text>
    <text x="0" y="202" font-family="Arial, sans-serif" font-size="28" fill="#475569">Runs in your browser. No upload required.</text>
    <g transform="translate(0 292)">
      <rect width="230" height="58" rx="29" fill="url(#accent)"/>
      <text x="115" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Pages</text>
      <rect x="252" width="230" height="58" rx="29" fill="#eef2ff"/>
      <text x="367" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3730a3">Ranges</text>
      <rect x="504" width="230" height="58" rx="29" fill="#ecfdf5"/>
      <text x="619" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#047857">Target size</text>
    </g>
  </g>
</svg>
