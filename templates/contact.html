<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google Tag Manager -->
    {% if gtm_id %}
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', '{{ gtm_id }}');</script>
    {% endif %}
    <!-- End Google Tag Manager -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - PDF Splitter</title>
    <meta name="description" content="Contact the PDF Splitter team for support, feedback, or inquiries.">

    <!-- Open Graph -->
    <meta property="og:url" content="{{ base_url }}/contact">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    {% if gtm_id %}
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ gtm_id }}" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    {% endif %}
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
        <h1>Contact Us</h1>
        <p class="subtitle">We'd love to hear from you</p>

        <form onsubmit="event.preventDefault(); alert('Thank you for your message! (Note: This is a demo form)');">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required placeholder="Your name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" required placeholder="How can we help?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

    <footer>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/terms">Terms</a>
            <a href="/privacy">Privacy</a>
            <a href="/contact">Contact</a>
        </nav>
        <span class="copyright">&copy; 2024 PDF Splitter. All rights reserved.</span>
    </footer>
</body>

</html>
